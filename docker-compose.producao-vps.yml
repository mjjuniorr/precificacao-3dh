services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - precificacao_pgdata:/var/lib/postgresql/data
    networks:
      - precificacao_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: ghcr.io/mjjuniorr/precificacao-nfe-api:${IMAGE_TAG:-latest}
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CORS_ORIGIN: https://${PRECIFICACAO_HOST:-precificacao.3dhmanaus.shop}
      OIDC_ISSUER: https://${AUTH_HOST:-auth.3dhmanaus.shop}/realms/3dh
      OIDC_JWKS_URL: http://portal-keycloak:8080/realms/3dh/protocol/openid-connect/certs
      OIDC_CLIENT_ID: precificacao-web
      OIDC_AUDIENCE: precificacao-web
      PORTAL_URL: https://${PORTAL_HOST:-portal.3dhmanaus.shop}
    networks:
      - precificacao_internal
      - PortainerRede
    depends_on:
      - db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/mjjuniorr/precificacao-nfe-web:${IMAGE_TAG:-latest}
    networks:
      - precificacao_internal
      - PortainerRede
    depends_on:
      - api
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=PortainerRede
        - traefik.http.routers.precificacao-nfe.rule=Host(`${PRECIFICACAO_HOST:-precificacao.3dhmanaus.shop}`)
        - traefik.http.routers.precificacao-nfe.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.precificacao-nfe.tls=true
        - traefik.http.routers.precificacao-nfe.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.services.precificacao-nfe.loadbalancer.server.port=80

volumes:
  precificacao_pgdata:

networks:
  precificacao_internal:
    driver: overlay
  PortainerRede:
    external: true
    name: PortainerRede
