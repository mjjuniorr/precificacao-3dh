services:
  precificacao-db:
    image: postgres:16-alpine
    networks:
      - PortainerRede
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-precificacao}
      POSTGRES_USER: ${POSTGRES_USER:-precificacao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - precificacao_pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  precificacao-api:
    image: ghcr.io/mjjuniorr/precificacao-nfe-api:92cd74f
    networks:
      - PortainerRede
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-precificacao}:${POSTGRES_PASSWORD}@precificacao-db:5432/${POSTGRES_DB:-precificacao}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://precificacao.3dhmanaus.com.br}
      AUTH_MODE: ${AUTH_MODE:-hybrid}
      APP_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER:-https://auth.3dhmanaus.com.br/realms/3dh}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-precificacao-web}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-precificacao-web}
      PORTAL_URL: ${PORTAL_URL:-https://portal.3dhmanaus.com.br}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  precificacao-web:
    image: ghcr.io/mjjuniorr/precificacao-nfe-web:92cd74f
    networks:
      - PortainerRede
    deploy:
      replicas: ${APP_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=PortainerRede
        - traefik.http.routers.precificacao_3dh_app.rule=Host(`${APP_HOST:-precificacao.3dhmanaus.com.br}`)
        - traefik.http.routers.precificacao_3dh_app.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.precificacao_3dh_app.tls=true
        - traefik.http.routers.precificacao_3dh_app.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.routers.precificacao_3dh_app.priority=${TRAEFIK_PRIORITY:-1}
        - traefik.http.routers.precificacao_3dh_app.service=precificacao_3dh_app
        - traefik.http.routers.precificacao_3dh_app.middlewares=precificacao_sslheader
        - traefik.http.services.precificacao_3dh_app.loadbalancer.server.port=80
        - traefik.http.services.precificacao_3dh_app.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.precificacao_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https

volumes:
  precificacao_pgdata:

networks:
  PortainerRede:
    external: true
    name: PortainerRede
